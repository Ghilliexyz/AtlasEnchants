name: AtlasEnchants
main: com.atlasplugins.atlasenchants.Main

version: '1.3.0'
authors: [_Ghillie]

api-version: '1.20'
description: Custom enchant plugin.

# This sets PlaceholderAPI as an optional dependency for your plugin.
softdepend: [PlaceholderAPI]

commands:
  atlasenchants:
    description: Atlas Enchants Command
    usage: /atlasenchants [subcommand]
    aliases: [aenchants, ae]

permissions:
  atlasenchants.help:
    description: Permission needed to use the help command.
    default: true
  atlasenchants.reloadconfig:
    description: Permission needed to use the reload command.
    default: true
  atlasenchants.giveenchant:
    description: Permission needed to use the give enchant command.
    default: true
