name: AtlasEnchants
version: '1.0'
main: com.atlasplugins.atlasenchants.Main
api-version: '1.20'
authors: [_Ghillie & Helix]
description: AtlasEnchants brings new custom enchants to the game that act as good vanilla enchants.
commands:
  giveenchant:
    description: Gives an enchanted item.
    usage: /giveenchant
  blacksmith:
    description: Access the blacksmith.
    usage: /blacksmith
  shop:
    description: Opens the shop.
    usage: /shop