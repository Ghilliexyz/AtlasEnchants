#
#    NOTE: Roman Numerals are only supported up to "10" AKA "X" this means you cannot increase your enchantment levels beyond 10 otherwise you will cause issues.
#

EnchantItems:
  #Type of Item the Enchantments will be.
  EnchantItem: ENCHANTED_BOOK
  #The sound that will play when the player applies a new enchant to an item.
  #https://hub.spigotmc.org/javadocs/spigot/org/bukkit/Sound.html < list of all sounds in minecraft.
  EnchantItemSounds:
    #------------------APPLYING ENCHANT SOUNDS------------------#
    #If True the custom enchant apply sound will play.
    EnchantItem-Apply-Sound-Toggle: true
    #The sound that plays when applying a custom enchant.
    EnchantItem-Apply-Sound: BLOCK_AMETHYST_BLOCK_BREAK
    #The volume the sound that plays at when applying a custom enchant.
    EnchantItem-Apply-Volume: 1
    #The pitch the sound that plays at when applying a custom enchant.
    EnchantItem-Apply-Pitch: 0.1
    #------------------ENCHANT ALREADY APPLIED SOUNDS------------------#
    #If True the custom enchant apply sound will play.
    EnchantItem-AlreadyApplied-Sound-Toggle: true
    #The sound that plays when a custom enchant is already applied.
    EnchantItem-AlreadyApplied-Sound: ENTITY_IRON_GOLEM_REPAIR
    #The volume the sound that plays when a custom enchant is already applied.
    EnchantItem-AlreadyApplied-Volume: 1
    #The pitch the sound that plays when a custom enchant is already applied.
    EnchantItem-AlreadyApplied-Pitch: 0.1
    #------------------BLACK LISTED SOUNDS------------------#
    #If True the custom enchant apply sound will play.
    EnchantItem-Blacklisted-Sound-Toggle: true
    #The sound that plays when a blacklisted enchant is found.
    EnchantItem-Blacklisted-Sound: BLOCK_ANVIL_LAND
    #The volume the sound that plays when a blacklisted enchant is found.
    EnchantItem-Blacklisted-Volume: 1
    #The pitch the sound that plays when a blacklisted enchant is found.
    EnchantItem-Blacklisted-Pitch: 0.1
  EnchantItemMessages:
    #------------------APPLYING ENCHANT Message------------------#
    #If True the success message will be sent to the player.
    EnchantItem-Success-Message-Toggle: true
    #The message that will be sent when applying a custom enchant to an item.
    EnchantItem-Success-Message:
      -  "&c&m&l------------&f&l [&x&F&F&3&C&3&C&lA&x&F&F&4&C&3&E&lt&x&F&E&5&C&4&0&ll&x&F&E&6&C&4&2&la&x&F&E&7&C&4&4&ls &x&F&D&8&C&4&6&lE&x&F&D&9&C&4&8&ln&x&F&D&A&B&4&A&lc&x&F&C&B&B&4&C&lh&x&F&C&C&B&4&E&la&x&F&C&D&B&5&0&ln&x&F&B&E&B&5&2&lt&x&F&B&F&B&5&4&ls&f&l] &c&m&l-------------"
      -  ""
      -  "&c● &7You &a&lSuccessfully &7Applied: &e&l{enchantName} &7lvl: &e&l{enchantLevel}"
      -  ""
      -  "&c&m&l-----------------------------------------"
    #------------------ENCHANT ALREADY APPLIED Message------------------#
    #If True the Already Applied message will be sent to the player.
    EnchantItem-AlreadyApplied-Message-Toggle: true
    #The message that will be sent when trying to apply an enchant to an item that has the same enchant already applied.
    EnchantItem-AlreadyApplied-Message:
      -  "&c&m&l------------&f&l [&x&F&F&3&C&3&C&lA&x&F&F&4&C&3&E&lt&x&F&E&5&C&4&0&ll&x&F&E&6&C&4&2&la&x&F&E&7&C&4&4&ls &x&F&D&8&C&4&6&lE&x&F&D&9&C&4&8&ln&x&F&D&A&B&4&A&lc&x&F&C&B&B&4&C&lh&x&F&C&C&B&4&E&la&x&F&C&D&B&5&0&ln&x&F&B&E&B&5&2&lt&x&F&B&F&B&5&4&ls&f&l] &c&m&l-------------"
      -  ""
      -  "&c● &7You cannot apply: &e&l{enchantName} &7lvl: &e&l{enchantLevel}"
      -  ""
      -  "&c● &7Because the item already has &c&l{existingEnchantName} &7applied."
      -  ""
      -  "&c● &7Existing Enchant: &c&l{existingEnchantName} &7has the same or lower level to &e&l{enchantName}"
      -  ""
      -  "&c&m&l-----------------------------------------"
    #------------------BLACK LISTED Message------------------#
    #If True blacklist system will work.
    EnchantItem-Blacklisted-Toggle: true
    #If True the blacklist message will be sent to the player.
    EnchantItem-Blacklisted-Message-Toggle: true
    #The message that will be sent when a blacklisted a custom enchant has been found on the item already.
    EnchantItem-Blacklisted-Message:
      -  "&c&m&l------------&f&l [&x&F&F&3&C&3&C&lA&x&F&F&4&C&3&E&lt&x&F&E&5&C&4&0&ll&x&F&E&6&C&4&2&la&x&F&E&7&C&4&4&ls &x&F&D&8&C&4&6&lE&x&F&D&9&C&4&8&ln&x&F&D&A&B&4&A&lc&x&F&C&B&B&4&C&lh&x&F&C&C&B&4&E&la&x&F&C&D&B&5&0&ln&x&F&B&E&B&5&2&lt&x&F&B&F&B&5&4&ls&f&l] &c&m&l-------------"
      -  ""
      -  "&c● &7You cannot apply: &e&l{enchantName} &7lvl: &e&l{enchantLevel}"
      -  ""
      -  "&c● &7Because there is a &c&lBlacklisted Enchant &7already."
      -  ""
      -  "&c● &7Blacklisted Enchant: &c&l{blackListedEnchantName} &7lvl: &c&l{blackListedEnchantLevel}"
      -  ""
      -  "&c&m&l-----------------------------------------"

Enchantments:
# --------------------- GODLY ENCHANTS --------------------- #
  FEARSIGHT:
    #Max Level of this Enchantment.
    Enchantment-MaxLvl: 3
    #The name of the Enchantment.
    Enchantment-Title: "&c&lGODLY &7FearSight"
    #Lore for the Enchantment.
    Enchantment-Lore:
      - "&c&m&l------------&f&l [&x&F&F&3&C&3&C&lA&x&F&F&4&C&3&E&lt&x&F&E&5&C&4&0&ll&x&F&E&6&C&4&2&la&x&F&E&7&C&4&4&ls &x&F&D&8&C&4&6&lE&x&F&D&9&C&4&8&ln&x&F&D&A&B&4&A&lc&x&F&C&B&B&4&C&lh&x&F&C&C&B&4&E&la&x&F&C&D&B&5&0&ln&x&F&B&E&B&5&2&lt&x&F&B&F&B&5&4&ls&f&l] &c&m&l-------------"
      - ""
      - "&c● &7Effect: &e&lGlowing Entities      &c● &7Enchant Lvl: &e&l{lvl}"
      - ""
      - "&c● &7Description:"
      - "  &eAllows the wearer to see Entities through walls."
      - "  &eDistance of enchant: {glowRange} blocks "
      - ""
      - "&c● &7Type: &eHelmet Enchantment"
      - ""
      - "&c● &7Usage: &eDrag n' Drop onto Helmet to enchant."
      - ""
      - "&c&m&l-----------------------------------------"
    #The lore that will be added to the enchanted Item.
    Enchantment-Apply-Lore: "&c● &7{enchantmentName} {lvl}"
    #The Item that the enchantment can be applied to.
    Enchantment-Apply-Item:
      - LEATHER_HELMET
      - CHAINMAIL_HELMET
      - IRON_HELMET
      - GOLDEN_HELMET
      - TURTLE_HELMET
      - DIAMOND_HELMET
      - NETHERITE_HELMET
