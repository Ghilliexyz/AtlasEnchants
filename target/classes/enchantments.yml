      - "&c● &7Type: &eHelmet Enchantment"
      - ""
      - "&c● &7Usage: &eDrag n' Drop onto Helmet to enchant."
      - ""
      - "&c&m&l-----------------------------------------"
    #The lore that will be added to the enchanted Item.
