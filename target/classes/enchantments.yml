AltarOfCirce:
  #Type of Item the Oracles of Enchantment will be.
  AltarOfCirce-Item: ENCHANTING_TABLE
  #If true the OraclesOfEnchantment-Item will have an enchantment glint on it.
  AltarOfCirce-Glint-Toggle: true
  #If true Oracle's Table can be crafted.
  AltarOfCirce-Crafting-Enabled: true
  #These are the crafting slots going from A = TOP LEFT to I = BOTTOM RIGHT
  # **NOTE** USE the letter 'X' if you want them to use the Oracles Of Enchantment Book in the recipe
  # **NOTE** USE the letter 'Y' if you want them to use the Scrap Of Circe's Weave in the recipe
  AltarOfCirce-Crafting-Row-1: "ABC"
  AltarOfCirce-Crafting-Row-2: "YXY"
  AltarOfCirce-Crafting-Row-3: "GHI"
  #These are the Crafting Materials inside the recipe
  # **NOTE** Do not leave any of these empty even if you don't use them in the crafting rows.
  # Also you can reuse the same Material and change the order on crafting Row-1 for example:
  # you can do "ACA" or "HHH" or even "HAA" if thats what you want.
  # Just make sure all Materials have some sort of material despite you using them or not.
  AltarOfCirce-Crafting-Materials-A: END_CRYSTAL
  AltarOfCirce-Crafting-Materials-B: NETHERITE_INGOT
  AltarOfCirce-Crafting-Materials-C: END_CRYSTAL
  AltarOfCirce-Crafting-Materials-D: PHANTOM_MEMBRANE
  AltarOfCirce-Crafting-Materials-E: BOOK
  AltarOfCirce-Crafting-Materials-F: PHANTOM_MEMBRANE
  AltarOfCirce-Crafting-Materials-G: ECHO_SHARD
  AltarOfCirce-Crafting-Materials-H: ECHO_SHARD
  AltarOfCirce-Crafting-Materials-I: ECHO_SHARD
  #If true Oracle's Table can be used.
  AltarOfCirce-Enabled: true
  #If true Oracle's Table will allow players to enchant Armour and Tools
  #Note this is false by default due to how OP it is.
  AltarOfCirce-ArmourTools-Enchanter-Enabled: true
  #If true Oracle's Table will allow players to enchant with vanilla enchants and custom enchants at the same time
  #Note only works when ArmourTools-Enchanter is set to true as well.
  AltarOfCirce-Allow-Vanilla-ToolsAndArmour-Enchants-Enabled: false
  #If true Oracle's Table will allow players to enchant Books
  AltarOfCirce-Book-Enchanter-Enabled: true
  #A list of all rarity's in the plugin. (0.5 = 50%)
  AltarOfCirce-Book-Enchanter-Odds:
    #Chance to get a Godly enchantment. default is 1 in 1000
    GODLY: 0.001
    #Chance to get a Legendary enchantment.
    LEGENDARY: 0.01
    #Chance to get an Epic enchantment.
    EPIC: 0.20
    #Chance to get a Rare enchantment.
    RARE: 0.40
    #Chance to get a Trash book.
    TRASH: 0.50
  #This allows you to flip the order of the enchants default is true, which means it will check all Rares all the way up to Godly
  #if false then it will check Godly first and make its way down to Rares.
  AltarOfCirce-Flip-List: true
  #The name of the Oracles of Enchantment.
  AltarOfCirce-DisplayName: "&f&k*&l &d&lAltar Of Circe &f&k*"
  #Lore for the Oracles of Enchantment.
  AltarOfCirce-Lore:
    - "&c&m&l------------&f&l [&x&F&F&3&C&3&C&lA&x&F&F&4&C&3&E&lt&x&F&E&5&C&4&0&ll&x&F&E&6&C&4&2&la&x&F&E&7&C&4&4&ls &x&F&D&8&C&4&6&lE&x&F&D&9&C&4&8&ln&x&F&D&A&B&4&A&lc&x&F&C&B&B&4&C&lh&x&F&C&C&B&4&E&la&x&F&C&D&B&5&0&ln&x&F&B&E&B&5&2&lt&x&F&B&F&B&5&4&ls&f&l] &c&m&l-------------"
    - ""
    - "&c● &7Description:"
    - "  &eForged by the enchantress Circe, mistress of lost magic,"
    - "  &ethis altar thrums with woven spells and buried truths."
    - "  &eIts surface glows faintly with echoes of divine power,"
    - "  &ewaiting for a worthy soul to awaken its purpose."
    - ""
    - "&c● &7Type: &eMythic Enchanting Altar"
    - ""
    - "&c● &7Usage: &ePlace and interact to invoke forgotten enchantments."
    - ""
    - "&c&m&l-----------------------------------------"

