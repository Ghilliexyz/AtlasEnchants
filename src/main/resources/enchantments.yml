Enchantments:
  # --------------------- DIVINE ENCHANTS --------------------- #
  POSEIDONS-BAIT:
    #Max Level of this Enchantment.
    Enchantment-MaxLvl: 3
    #The Rarity of the enchantment.
    Enchantment-Rarity: "DIVINE"
    #If true the enchantment can be Found, Applied, and Used if already applied. if false the opposite for all happens.
    Enchantment-Enabled: true
    #The name of the Enchantment.
    Enchantment-Title: "&4&lDIVINE &7Poseidon's Bait"
    #Lore for the Enchantment.
    Enchantment-Lore:
      - "{header}"
      - ""
      - "&c● &7Effect: &e&lFishing Luck     &c● &7Enchant Lvl: &e&l{lvl}"
      - ""
      - "&c● &7Description:"
      - "  &eGives a {BaitChance}% Chance to find custom enchants while fishing."
      - ""
      - "&c● &7Type: &eFishing Rod Enchantment"
      - ""
      - "&c● &7Usage: &eDrag n' Drop onto Fishing Rod to enchant."
      - ""
      - "{footer}"
    #The lore that will be added to the enchanted Item.
    Enchantment-Apply-Lore: "&4● &7{enchantmentName} {lvl}"
    #The Item that the enchantment can be applied to.
    Enchantment-Apply-Item:
      # Fishing rod
      - FISHING_ROD
    #This enchantment cannot be applied if any of the following enchantments are applied to the item.
    #Note 1: Make sure the enchantment name is the exact name of the enchantment in the config, or it won't work
    #Note 2: Make sure to add this enchant Name (POSEIDONS-BAIT) to the enchantment Blacklist of the other enchantments you have listed below.
    Enchantment-Blacklist-Enchants:
      -
      #Particle Settings for PoseidonsBait
    Particle-Settings:
      #Particle Toggle (if true the particles will show)
      Toggle: true
      Particle-1:
        #Particle Name (The particle that will spawn)
        Name: SOUL_FIRE_FLAME
        #Particle Amount (50 = 50 Particles)
        Amount: 50
        #Particle Size (0.1 = 1 10th of the max scale, 1 = normal size)
        Size: 0.1
    #The % chance of catching an enchant. ( 0.05 = 5% | 0.5 = 50% )
    PoseidonsBait-ProcChance-1: 0.01
    PoseidonsBait-ProcChance-2: 0.02
    PoseidonsBait-ProcChance-3: 0.03

