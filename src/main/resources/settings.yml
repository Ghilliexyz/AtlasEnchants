#Circe's Anvil Sounds
CircesAnvilSounds:
  OpenAnvil:
    Toggle: true
    Sound: BLOCK_ANVIL_USE
    Volume: 1
    Pitch: 1

EnchantItems:
  #Type of Item the Enchantments will be.
  EnchantItem: ENCHANTED_BOOK
  #If true the EnchantItem will have an enchantment glint on it.
  EnchantItem-Glint-Toggle: false
  #This chance determines if it should run the spawning enchant logic to spawn an enchantment
  #Default Spawn Chance = 0.10 (0.10 = 10% chance that it will allow the spawning system to loop through all the enchants)
  #if the spawning chance fails no enchantment attempt to be spawned.
  EnchantItem-Spawn-Chance: 0.10
  #A list of all rarity's in the plugin. (0.5 = 50%)
  EnchantItem-Rarity-List:
    #Chance to get a Divine enchantment. default is 0.01 so you have a 1 in 100 chance.
    DIVINE: 0.01
    #Chance to get a Godly enchantment.
    GODLY: 0.15
    #Chance to get a Legendary enchantment.
    LEGENDARY: 0.20
    #Chance to get an Epic enchantment.
    EPIC: 0.25
    #Chance to get a Rare enchantment.
    RARE: 0.40
    #Chance to get a Trash book. default is 0 because it's only meant to be obtainable via the Altar Of Circe
    TRASH: 0
  #This allows you to flip the order of the enchants default is true, which means it will check all Rares all the way up to Godly
  #if false then it will check Godly first and make its way down to Rares.
  EnchantItem-Flip-List: true

#Settings for Upgrading Enchantments.
UpgradeEnchantSettings:
  #The number of matching enchantment books required to upgrade. Min: 1, Max: 10.
  Required-Books: 10

#The sound that will play when the player applies a new Upgrade to an item.
#https://hub.spigotmc.org/javadocs/spigot/org/bukkit/Sound.html < list of all sounds in minecraft.
UpgradeEnchantSounds:
  #------------------UPGRADING SUCCESSFUL SOUNDS------------------#
  SuccessUpgrade:
    Toggle: true
    Sound: BLOCK_AMETHYST_BLOCK_BREAK
    Volume: 1
    Pitch: 0.1
  #------------------UPGRADING NOT ENOUGH ITEMS SOUNDS------------------#
  NotEnoughItems:
    Toggle: true
    Sound: ENTITY_IRON_GOLEM_REPAIR
    Volume: 1
    Pitch: 0.1
  #------------------UPGRADING MAX RARITY SOUNDS------------------#
  MaxRarity:
    Toggle: true
    Sound: ENTITY_IRON_GOLEM_REPAIR
    Volume: 1
    Pitch: 0.01
  #------------------UPGRADING DISABLED SOUNDS------------------#
  DisabledMenu:
    Toggle: true
    Sound: BLOCK_ANVIL_LAND
    Volume: 1
    Pitch: 0.1

UpgradeEnchantMessages:
  #------------------UPGRADING SUCCESSFUL Message------------------#
  SuccessUpgrade:
    Toggle: true
    Message:
      -  "{header}"
      -  ""
      -  "&c● &7You &a&lSuccessfully Upgraded: &7from {requiredBooks} &e&l{oldRarity} &7to 1 &e&l{newRarity}"
      -  ""
      -  "{footer}"
  #------------------UPGRADING NEED MORE ITEMS Message------------------#
  NotEnoughItems:
    Toggle: true
    Message:
      -  "{header}"
      -  ""
      -  "&c● &7You cannot upgrade."
      -  ""
      -  "&c● &7Reason: &eNot enough matching rarity enchantments&7."
      -  ""
      -  "&c● &7You need {requiredBooks}: &e{oldRarity}&7."
      -  ""
      -  "{footer}"
  #------------------UPGRADING MAX RARITY Message------------------#
  MaxRarity:
    Toggle: true
    Message:
      -  "{header}"
      -  ""
      -  "&c● &7You cannot upgrade."
      -  ""
      -  "&c● &7Reason: &eYour enchantment is already at the highest rarity (GODLY) and cannot be upgraded&7."
      -  ""
      -  "{footer}"
  #------------------UPGRADING DISABLED Message------------------#
  DisabledMenu:
    Toggle: true
    Message:
      -  "{header}"
      -  ""
      -  "&c● &7You cannot upgrade."
      -  ""
      -  "&c● &7Reason: &eUpgrading is currently &cDisabled&7."
