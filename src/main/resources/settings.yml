EnchantItems:
  #Type of Item the Enchantments will be.
  EnchantItem: ENCHANTED_BOOK
  #If true the EnchantItem will have an enchantment glint on it.
  EnchantItem-Glint-Toggle: false
  #This chance determines if it should run the spawning enchant logic to spawn an enchantment
  #Default Spawn Chance = 0.10 (0.10 = 10% chance that it will allow the spawning system to loop through all the enchants)
  #if the spawning chance fails no enchantment attempt to be spawned.
  EnchantItem-Spawn-Chance: 0.10
  #A list of all rarity's in the plugin. (0.5 = 50%)
  EnchantItem-Rarity-List:
    #Chance to get a Godly enchantment.
    GODLY: 0.15
    #Chance to get a Legendary enchantment.
    LEGENDARY: 0.20
    #Chance to get an Epic enchantment.
    EPIC: 0.25
    #Chance to get a Rare enchantment.
    RARE: 0.40
  #This allows you to flip the order of the enchants default is true, which means it will check all Rares all the way up to Godly
  #if false then it will check Godly first and make its way down to Rares.
  EnchantItem-Flip-List: true

OblivionShard:
  #Type of Item the Oblivion Shard will be.
  OblivionShard-Item: PRISMARINE_SHARD
  #If true the OblivionShard-Item will have an enchantment glint on it.
  OblivionShard-Glint-Toggle: true
  #The chance of an Oblivion Shard spawning (0.05 = 5%)
  OblivionShard-Spawn-Chance: 0.05
  #If true the Oblivion Shard can be Found, and Used. if false the opposite for all happens.
  OblivionShard-Enabled: true
  #If true the Oblivion Shard can return the Enchant it removed.
  OblivionShard-ReturnEnchant-Enabled: false
  #The chance that when removing an enchant from an item it will give the player the enchant back in its normal form.
  #Default = 0.5 (0.5 = 50%) if you set it to 0 that will act as a disabled method, meaning it will never give the enchant back.
  OblivionShard-ReturnEnchant-Chance: 0.5
  #The name of the Oblivion Shard.
  OblivionShard-DisplayName: "&c&l&k@ &6&lOblivion Shard &c&l&k@"
  #Lore for the Oblivion Shard.
  OblivionShard-Lore:
    - "&c&m&l------------&f&l [&x&F&F&3&C&3&C&lA&x&F&F&4&C&3&E&lt&x&F&E&5&C&4&0&ll&x&F&E&6&C&4&2&la&x&F&E&7&C&4&4&ls &x&F&D&8&C&4&6&lE&x&F&D&9&C&4&8&ln&x&F&D&A&B&4&A&lc&x&F&C&B&B&4&C&lh&x&F&C&C&B&4&E&la&x&F&C&D&B&5&0&ln&x&F&B&E&B&5&2&lt&x&F&B&F&B&5&4&ls&f&l] &c&m&l-------------"
    - ""
    - "&c● &7Description:"
    - "  &eRemoves a random custom enchant from any item."
    - "  &eHas a {oblivionShardChance}% to give back the enchantment."
    - ""
    - "&c● &7Type: &eShard"
    - ""
    - "&c● &7Usage: &eDrag n' Drop onto Any Item."
    - ""
    - "&c&m&l-----------------------------------------"

#The sound that will play when the player applies a new Shard to an item.
#https://hub.spigotmc.org/javadocs/spigot/org/bukkit/Sound.html < list of all sounds in minecraft.
ShardItemSounds:
  #------------------APPLYING SHARD SOUNDS------------------#
  #If True the custom Shard apply sound will play.
  ShardItem-Apply-Sound-Toggle: true
  #The sound that plays when applying a custom Shard.
  ShardItem-Apply-Sound: BLOCK_AMETHYST_BLOCK_BREAK
  #The volume the sound plays at when applying a custom Shard.
  ShardItem-Apply-Volume: 1
  #The pitch the sound plays at when applying a custom Shard.
  ShardItem-Apply-Pitch: 0.1
  #------------------NO ENCHANTS APPLIED SOUNDS------------------#
  #If True the custom Shard apply sound will play.
  ShardItem-NoEnchantsApplied-Sound-Toggle: true
  #The sound that plays when a custom Shard is already applied.
  ShardItem-NoEnchantsApplied-Sound: ENTITY_IRON_GOLEM_REPAIR
  #The volume the sound plays when a custom Shard is already applied.
  ShardItem-NoEnchantsApplied-Volume: 1
  #The pitch the sound plays when a custom Shard is already applied.
  ShardItem-NoEnchantsApplied-Pitch: 0.1
  #------------------DISABLED SHARD SOUNDS------------------#
  #If True the custom Shard apply sound will play.
  ShardItem-DisabledShard-Sound-Toggle: true
